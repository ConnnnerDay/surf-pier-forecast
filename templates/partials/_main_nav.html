<nav class="app-nav" aria-label="Primary">
  <button class="app-nav-toggle" type="button" aria-expanded="false" aria-controls="app-nav-links" onclick="toggleAppNav(this)">
    Menu
  </button>
  <ul id="app-nav-links" class="app-nav-links">
    <li><a href="{{ url_for('views.index') }}"{% if request.endpoint == 'views.index' %} class="app-nav-active" aria-current="page"{% endif %}>Dashboard</a></li>
    <li><a href="{{ url_for('views.live_cams') }}"{% if request.endpoint == 'views.live_cams' %} class="app-nav-active" aria-current="page"{% endif %}>Live Cams</a></li>
    <li><a href="{{ url_for('views.fishing_log') }}"{% if request.endpoint == 'views.fishing_log' %} class="app-nav-active" aria-current="page"{% endif %}>Fishing Log</a></li>
    {% if user %}
    <li><a href="{{ url_for('auth.account') }}"{% if request.endpoint in ('auth.account', 'auth.account_settings') %} class="app-nav-active" aria-current="page"{% endif %}>Account</a></li>
    {% endif %}
  </ul>
</nav>

<script>
function toggleAppNav(btn) {
  var links = document.getElementById('app-nav-links');
  if (!links) return;
  var expanded = btn.getAttribute('aria-expanded') === 'true';
  btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
  links.classList.toggle('is-open');
}
</script>
