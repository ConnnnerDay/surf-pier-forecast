<nav class="app-nav" aria-label="Primary">
  <button class="app-nav-toggle" type="button" aria-expanded="false" aria-controls="app-nav-links" onclick="toggleAppNav(this)">
    Menu
  </button>
  <ul id="app-nav-links" class="app-nav-links">
    <li><a href="{{ url_for('views.index') }}">Dashboard</a></li>
    <li><a href="{{ url_for('views.live_cams') }}">Live Cams</a></li>
    <li><a href="{{ url_for('views.index') }}#fish-log">Fishing Log</a></li>
    {% if user %}
    <li class="app-nav-account-item">
      <a href="{{ url_for('auth.account') }}">Account</a>
      <ul class="app-nav-submenu" aria-label="Account links">
        <li><a href="{{ url_for('views.setup') }}">Location</a></li>
        <li><a href="{{ url_for('views.profile') }}">Profile</a></li>
      </ul>
    </li>
    <li class="app-nav-divider" aria-hidden="true"></li>
    <li class="app-nav-user-item">
      <span class="app-nav-username">{{ user.username }}</span>
      <form method="post" action="{{ url_for('auth.logout') }}" class="app-nav-logout-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="app-nav-logout-btn">Log Out</button>
      </form>
    </li>
    {% endif %}
  </ul>
</nav>
<script>
function toggleAppNav(btn) {
  var links = document.getElementById('app-nav-links');
  if (!links) return;
  var expanded = btn.getAttribute('aria-expanded') === 'true';
  btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
  links.classList.toggle('is-open');
}
</script>
