<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &mdash; Surf &amp; Pier Fishing Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="theme-color" content="#0e5f78">
    {% include 'partials/_theme_bootstrap.html' %}
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Surf &amp; Pier Fishing Outlook</h1>
            <p class="subtitle">Log in to your account</p>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <h2>Log In</h2>

            {% if error %}
            <div class="setup-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="auth-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username"
                           value="{{ username|default('', true) }}" class="auth-input" maxlength="30"
                           autocomplete="username" required autofocus>
                </div>
                <div class="auth-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password"
                           class="auth-input" autocomplete="current-password" required>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
            <p class="auth-switch"><a href="{{ url_for('auth.landing') }}">&larr; Back</a></p>
        </section>
    </main>

    <footer>
        <p>Surf &amp; Pier Fishing Outlook</p>
    </footer>
</body>
</html>
